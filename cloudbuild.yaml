# Cloud Build configuration for building and deploying to Cloud Run
# This file is used by Google Cloud Build to automate the CI/CD pipeline

steps:
  # Run backend tests
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --no-cache-dir -r requirements.txt &&
        python3 -m unittest discover -s backend/tests -p "test_*.py"

  # Run frontend tests
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend &&
        npm ci &&
        NODE_OPTIONS=--max-old-space-size=2048 npm run test -- --run --exclude='**/AppChatPage.avatar.test.tsx' --maxWorkers=4 --minWorkers=1

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      # Postgres school-domain dual-write (slice 2c). Reads stay Firestore; the
      # shadow is fail-open. DB_IAM_AUTH=1 = passwordless IAM as the Cloud Run SA
      # (Cloud SQL IAM user 6288717566-compute@developer, DML-only grants). Flip
      # _DUAL_WRITE_SCHOOL_CHAIN=0 (via --substitutions) to disable without an edit.
      - 'FLASK_ENV=production,AZURE_SPEECH_REGION=${_AZURE_SPEECH_REGION},PUBLIC_BASE_URL=${_PUBLIC_BASE_URL},SUPPORT_EMAIL=${_SUPPORT_EMAIL},INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},DB_USER=${_DB_USER},DB_NAME=${_DB_NAME},DB_IAM_AUTH=1,DB_IP_TYPE=PUBLIC,DUAL_WRITE_SCHOOL_CHAIN=${_DUAL_WRITE_SCHOOL_CHAIN},DUAL_WRITE_ENROLLMENTS=${_DUAL_WRITE_ENROLLMENTS},DUAL_WRITE_ASSIGNMENTS=${_DUAL_WRITE_ASSIGNMENTS},DUAL_WRITE_ANALYTICS_SESSIONS=${_DUAL_WRITE_ANALYTICS_SESSIONS},DUAL_WRITE_ANALYTICS_EVENTS=${_DUAL_WRITE_ANALYTICS_EVENTS},READ_PG_ORGANIZATIONS=${_READ_PG_ORGANIZATIONS},READ_PG_MEMBERSHIPS=${_READ_PG_MEMBERSHIPS},READ_PG_CLASSES=${_READ_PG_CLASSES},READ_PG_ENROLLMENTS=${_READ_PG_ENROLLMENTS},READ_PG_ASSIGNMENTS=${_READ_PG_ASSIGNMENTS},READ_PG_ANALYTICS_SESSIONS=${_READ_PG_ANALYTICS_SESSIONS},READ_PG_ANALYTICS_EVENTS=${_READ_PG_ANALYTICS_EVENTS},WRITE_FIRESTORE_ANALYTICS=${_WRITE_FIRESTORE_ANALYTICS}'
      - '--set-secrets'
      - 'OPENAI_API_KEY=${_SECRET_NAME}:latest,SECRET_KEY=flask-secret-key:latest,AZURE_SPEECH_KEY=azure-speech-key:latest,CANVAS_PAT_ENCRYPTION_KEY=canvas-pat-encryption-key:latest,RESEND_API_KEY=RESEND_API_KEY:latest,ATTESTATION_HASH_SALT=attestation-hash-salt:latest'

# Substitution variables (can be overridden at build time)
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: lingual-app
  _ARTIFACT_REPO: lingual-repo
  _SECRET_NAME: openai-api-key
  _IMAGE_TAG: manual
  _AZURE_SPEECH_REGION: eastus
  _PUBLIC_BASE_URL: https://l1ngual.com
  _SUPPORT_EMAIL: help@l1ngual.com
  # Postgres dual-write. IAM auth = no DB password; the Cloud Run SA is the Cloud
  # SQL IAM user. _DUAL_WRITE_SCHOOL_CHAIN gates the fail-open parent-chain shadow
  # (org/membership/class); _DUAL_WRITE_ENROLLMENTS gates the enrollment shadow.
  # Parent chain must be enabled first (it is) so enrollment FKs resolve.
  _INSTANCE_CONNECTION_NAME: 'lingu-480600:us-central1:lingual'
  _DB_USER: '6288717566-compute@developer'
  _DB_NAME: lingual
  _DUAL_WRITE_SCHOOL_CHAIN: '1'
  _DUAL_WRITE_ENROLLMENTS: '1'
  # _DUAL_WRITE_ASSIGNMENTS gates the fail-open assignment shadow (ANALYTICS_MIGRATION
  # Slice A — the FK parent of practice_sessions/learning_events). ENABLED '1' on
  # 2026-06-02 (rev 00051) after Alembic 0002 (grade_metric/grade_points) was applied
  # to the live instance (rollout order: the migration MUST precede this flag, else the
  # shadow INSERT references a missing column and fail-opens to a silent no-op). The
  # unified backfill then wrote 40/40 assignments at perfect parity (0 missing/0 extra).
  _DUAL_WRITE_ASSIGNMENTS: '1'
  # _DUAL_WRITE_ANALYTICS_SESSIONS gates the fail-open practice_session shadow
  # (ANALYTICS_MIGRATION Slice B — the FK parent of learning_events). Sessions ride
  # the LIVE practice path, so the shadow uses a bounded hot-path statement_timeout
  # (1000ms create / 2000ms per-turn UPDATE), not the 10s `_run`. FLIPPED to '1' on
  # 2026-06-02 (rev lingual-app-00056-kmv) after deploy rev 00055 (flag '0') →
  # --update-env-vars flip → term-scope backfill `--write` (practice_sessions 48
  # inserted/0 errors) + `--parity` (in_sync, fs 48 = pg 48, 0 missing/0 extra).
  # Prereq (§5b.5) satisfied: DUAL_WRITE_ASSIGNMENTS=1 + READ_PG_ASSIGNMENTS=1 live so
  # session assignment_id FKs resolve. Default bumped 0→1 here for durability (deploy
  # uses --set-env-vars=REPLACE; a substitution still '0' would regress the live flip).
  # Rollback is instant: --update-env-vars DUAL_WRITE_ANALYTICS_SESSIONS=0 (no rebuild).
  # The orphaned-session reconciler (POST /internal/analytics/sweep-orphaned-sessions)
  # is now armed but still needs INTERNAL_SCHEDULER_SECRET wired into --set-secrets +
  # a Cloud Scheduler job to actually run (separate activation step).
  _DUAL_WRITE_ANALYTICS_SESSIONS: '1'
  # _DUAL_WRITE_ANALYTICS_EVENTS gates the fail-open learning_events shadow
  # (ANALYTICS_MIGRATION Slice C — `shadow_write_turn`, the FK child of
  # practice_sessions). When '1' the per-turn shadow writes the turn's events AND
  # the session-summary/finalize UPDATE in ONE transaction (one pool checkout), and
  # the standalone shadow_update_practice_session self-disables (§5b.2 #7 flag matrix).
  # HELD at '0': Slice C is code-complete (committed) but the flag stays OFF until
  # DUAL_WRITE_ANALYTICS_SESSIONS=1 (shipped 2026-06-02) has SOAKED — §5b.5 ordering:
  # events FK to sessions, so enabling this before sessions are reliably in PG makes
  # every event shadow a silent FK no-op. Flip sequence when soak is clean: run
  # scripts/backfill_learning_events_term.py --write (chunked bulk) + --parity
  # (per-session COUNT in_sync) FIRST, then --update-env-vars DUAL_WRITE_ANALYTICS_EVENTS=1,
  # then bump this default 0->1 for durability. Rollback is instant: =0 (no rebuild).
  # FLIPPED to '1' (LIVE) 2026-06-03 (rev 00058) after Slice B soak: events term-backfill
  # 1401 inserted/0 errors + --parity per-session COUNT in_sync (fs 1401 = pg 1401, 0
  # short/0 surplus). Default bumped 0->1 so a redeploy preserves the live shadow.
  _DUAL_WRITE_ANALYTICS_EVENTS: '1'
  # Read-cutover flags (read phase). Per entity: '0'/'' = Firestore only,
  # 'shadow' = Firestore authoritative + PG parity compare (logged), '1' = PG
  # authoritative, fail-open to Firestore. organizations FLIPPED to '1' on
  # 2026-06-01 (rev 00045) after a clean shadow soak (25+ compares, 0 mismatched)
  # + dual-write drop-rate 0 + parity at the documented-junk baseline. memberships
  # 'shadow' (get_membership + get_user_memberships only; admin lists +
  # resolve_user_school_context stay on Firestore — D4/§5). classes FLIPPED to '1'
  # on 2026-06-02 (rev 00047) — get_class + list_org/teacher_classes +
  # get_class_by_join_code now PG-authoritative (authz/AI-tutor/student-join) after
  # a clean soak (100 compares, 0 mismatched across point-get + list readers) + 24/24
  # PG-served post-flip with 0 fail-open. Rollback = flip back to 'shadow'/'0'
  # (instant, no rebuild: gcloud run services update --update-env-vars).
  _READ_PG_ORGANIZATIONS: '1'
  _READ_PG_MEMBERSHIPS: 'shadow'
  _READ_PG_CLASSES: '1'
  # enrollments-read slice (8): FLIPPED to '1' (PG-authoritative) 2026-06-02 (rev
  # 00049) — roster / studentCount / practice-launch gate; the LAST relational read
  # family. Promoted after a clean shadow soak (100 compared / 0 mismatched, 0
  # fail-open) + timestamp-preserving re-backfill + parity at baseline + codex review.
  # list_student_classes rides min(READ_PG_ENROLLMENTS, READ_PG_CLASSES). Rollback =
  # instant --update-env-vars READ_PG_ENROLLMENTS=shadow (or '0'). org/class/enrollment
  # reads now all PG-authoritative; memberships stays 'shadow' by design (D4).
  _READ_PG_ENROLLMENTS: '1'
  # assignments-read slice (A): FLIPPED to '1' (PG-authoritative, fail-open) on
  # 2026-06-02 (rev 00054) — get_assignment + list_class_assignments now read Postgres.
  # Promoted after a COMPREHENSIVE pre-flip proof: an offline analog of the get_assignment
  # shadow over ALL 41 prod assignments (40 backfilled + 1 live-created) returned 41/41
  # clean, 0 mismatched — stronger than a sampled soak. That run surfaced one real
  # divergence, the vestigial `mapping_id` legacy field (39/40 carry a dangling ref to the
  # removed curriculum-overlay collection; no read path consumes it), now in
  # _ASSIGNMENT_SHADOW_IGNORE (rev 00053). Live dual-write create verified (40->41 in PG),
  # live shadow logged 0 MISMATCH, post-flip reads served from PG with 0 fail-open. The
  # read adapter inverts FKs to parents' store-invariant legacy ids and normalizes
  # target_language_intensity/release_at/due_at. Rollback is instant via
  # --update-env-vars READ_PG_ASSIGNMENTS=shadow (or '0'), no rebuild.
  _READ_PG_ASSIGNMENTS: '1'
  # Analytics read-cutover flags (Slice D, ANALYTICS_MIGRATION §4.3/§4.4). 3-state
  # off/shadow/1, fail-open. The router gates each on the WEAKER of its own flag and
  # an upstream: SESSIONS reads also-gate on READ_PG_ASSIGNMENTS (=1 live), EVENTS
  # reads also-gate on READ_PG_ANALYTICS_SESSIONS. Both HELD '0': Slice D is code-
  # complete (adapters + router + GIN 0003) but the shadow soak / flip is gated —
  # SESSIONS can shadow now (practice_sessions are in PG, 48 backfilled), EVENTS
  # cannot until Slice C's DUAL_WRITE_ANALYTICS_EVENTS is enabled + the event term-
  # backfill runs (else PG has no events and the shadow shows everything missing).
  # Per §5b.5 the read FLIPS to '1' are Slice E, after the events dual-write flip.
  # Soak/flip order: deploy → READ_PG_ANALYTICS_SESSIONS=shadow (soak, run
  # scripts/analytics_read_parity.py Pass 1) → '1' → (after events live) EVENTS=shadow
  # → '1'. Apply Alembic 0003 (payload GIN) before EVENTS read perf matters.
  # SESSIONS FLIPPED to '1' (PG-AUTHORITATIVE, fail-open) 2026-06-03 (rev 00059-msz)
  # after: Pass 1 session_summary parity in_sync 49/49 0 mismatched (incl. 1 LIVE
  # non-backfilled smoke-test session), Pass 2 event-COUNT in_sync (1408=1408), a live
  # shadow compare (1 compared/0 mismatched), and post-flip teacher analytics PG-served
  # with 0 fail-open. Default bumped shadow->'1' for durability. Rollback instant: =shadow
  # (or '0').
  # _WRITE_FIRESTORE_ANALYTICS (Slice E retirement, ANALYTICS_MIGRATION §5). Default '1'
  # = Firestore is the system of record for practice_sessions + learning_events (written
  # first, PG mirrors fail-open) — TODAY'S BEHAVIOR, build-then-hold. '0' = Firestore
  # writes RETIRED, Postgres is the SOLE store, writes fail-CLOSED (a PG failure surfaces
  # as a 500 the SPA retries — not a silent drop). HARD PREREQS before flipping '0':
  # READ_PG_ANALYTICS_SESSIONS=1 (live — the get_practice_session read-after-write must
  # resolve from PG) AND DUAL_WRITE_ANALYTICS_EVENTS=1 (live — else events stop persisting).
  # Flip only after a clean confidence sprint at '1'. Rollback instant: =1 (Firestore
  # writes resume; PG-only sessions created during '0' keep valid Firestore-style ids).
  _WRITE_FIRESTORE_ANALYTICS: '1'
  _READ_PG_ANALYTICS_SESSIONS: '1'
  # EVENTS FLIPPED to '1' (PG-AUTHORITATIVE, fail-open) 2026-06-03 (rev 00061-29z) after:
  # Alembic 0003 payload GIN applied to prod (alembic upgrade head as postgres owner;
  # learning_events_payload_gin_idx backs the context_tag/error payload aggregations),
  # Pass 2 event-COUNT in_sync (1408=1408), a live event-read shadow compare (1/0 via
  # list_assignment_learning_events), post-flip pedagogy aggregations PG-served 0 fail-open.
  # Default bumped 0->'1'. Rollback instant: =shadow (or '0'). ALL analytics reads now PG.
  _READ_PG_ANALYTICS_EVENTS: '1'

# Store images in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  # The frontend jsdom suite should complete within a normal 2 GB V8 heap.
  # Keep a moderate worker count for speed, but keep the heap cap low enough
  # that future retained-memory loops fail fast instead of exhausting the build VM.
  machineType: 'E2_HIGHCPU_8'
