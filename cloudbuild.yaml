# Cloud Build configuration for building and deploying to Cloud Run
# This file is used by Google Cloud Build to automate the CI/CD pipeline

steps:
  # Run backend tests
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --no-cache-dir -r requirements.txt &&
        python3 -m unittest discover -s backend/tests -p "test_*.py"

  # Run frontend tests
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend &&
        npm ci &&
        NODE_OPTIONS=--max-old-space-size=2048 npm run test -- --run --exclude='**/AppChatPage.avatar.test.tsx' --maxWorkers=4 --minWorkers=1

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      # Postgres school-domain dual-write (slice 2c). Reads stay Firestore; the
      # shadow is fail-open. DB_IAM_AUTH=1 = passwordless IAM as the Cloud Run SA
      # (Cloud SQL IAM user 6288717566-compute@developer, DML-only grants). Flip
      # _DUAL_WRITE_SCHOOL_CHAIN=0 (via --substitutions) to disable without an edit.
      - 'FLASK_ENV=production,AZURE_SPEECH_REGION=${_AZURE_SPEECH_REGION},PUBLIC_BASE_URL=${_PUBLIC_BASE_URL},SUPPORT_EMAIL=${_SUPPORT_EMAIL},INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},DB_USER=${_DB_USER},DB_NAME=${_DB_NAME},DB_IAM_AUTH=1,DB_IP_TYPE=PUBLIC,DUAL_WRITE_SCHOOL_CHAIN=${_DUAL_WRITE_SCHOOL_CHAIN},DUAL_WRITE_ENROLLMENTS=${_DUAL_WRITE_ENROLLMENTS},READ_PG_ORGANIZATIONS=${_READ_PG_ORGANIZATIONS}'
      - '--set-secrets'
      - 'OPENAI_API_KEY=${_SECRET_NAME}:latest,SECRET_KEY=flask-secret-key:latest,AZURE_SPEECH_KEY=azure-speech-key:latest,CANVAS_PAT_ENCRYPTION_KEY=canvas-pat-encryption-key:latest,RESEND_API_KEY=RESEND_API_KEY:latest,ATTESTATION_HASH_SALT=attestation-hash-salt:latest'

# Substitution variables (can be overridden at build time)
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: lingual-app
  _ARTIFACT_REPO: lingual-repo
  _SECRET_NAME: openai-api-key
  _IMAGE_TAG: manual
  _AZURE_SPEECH_REGION: eastus
  _PUBLIC_BASE_URL: https://l1ngual.com
  _SUPPORT_EMAIL: help@l1ngual.com
  # Postgres dual-write. IAM auth = no DB password; the Cloud Run SA is the Cloud
  # SQL IAM user. _DUAL_WRITE_SCHOOL_CHAIN gates the fail-open parent-chain shadow
  # (org/membership/class); _DUAL_WRITE_ENROLLMENTS gates the enrollment shadow.
  # Parent chain must be enabled first (it is) so enrollment FKs resolve.
  _INSTANCE_CONNECTION_NAME: 'lingu-480600:us-central1:lingual'
  _DB_USER: '6288717566-compute@developer'
  _DB_NAME: lingual
  _DUAL_WRITE_SCHOOL_CHAIN: '1'
  _DUAL_WRITE_ENROLLMENTS: '1'
  # Read-cutover flag (read phase). DEFAULT OFF ('0'): reads stay 100% Firestore.
  # Flip to 'shadow' (Firestore authoritative + PG parity compare, logged) for a
  # soak, then '1' (PG authoritative, fail-open) — via --substitutions, no edit.
  _READ_PG_ORGANIZATIONS: '0'

# Store images in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  # The frontend jsdom suite should complete within a normal 2 GB V8 heap.
  # Keep a moderate worker count for speed, but keep the heap cap low enough
  # that future retained-memory loops fail fast instead of exhausting the build VM.
  machineType: 'E2_HIGHCPU_8'
