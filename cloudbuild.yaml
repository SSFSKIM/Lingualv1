# Cloud Build configuration for building and deploying to Cloud Run
# This file is used by Google Cloud Build to automate the CI/CD pipeline

steps:
  # Run backend tests
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --no-cache-dir -r requirements.txt &&
        python3 -m unittest discover -s backend/tests -p "test_*.py"

  # Run frontend tests
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend &&
        npm ci &&
        npm run test -- --run

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'FLASK_ENV=production,AZURE_SPEECH_REGION=${_AZURE_SPEECH_REGION}'
      - '--set-secrets'
      - 'OPENAI_API_KEY=${_SECRET_NAME}:latest,SECRET_KEY=flask-secret-key:latest,AZURE_SPEECH_KEY=azure-speech-key:latest,CANVAS_PAT_ENCRYPTION_KEY=canvas-pat-encryption-key:latest'

# Substitution variables (can be overridden at build time)
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: lingual-app
  _ARTIFACT_REPO: lingual-repo
  _SECRET_NAME: openai-api-key
  _IMAGE_TAG: manual
  _AZURE_SPEECH_REGION: eastus

# Store images in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
